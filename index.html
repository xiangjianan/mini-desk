<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>Life is short, use AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="board" aria-label="To Do List 看板">
      <section class="panel image-panel" aria-labelledby="image-title">
        <div class="panel-header">
          <h1 id="image-title">图</h1>
          <span id="imageCount" class="count">0</span>
        </div>
        <div id="imageList" class="image-list" aria-label="图床图片列表"></div>
      </section>

      <section class="panel note-link-panel" aria-labelledby="note-title">
        <div class="split-block note-block">
          <div class="panel-header">
            <h2 id="note-title">记</h2>
          </div>
          <div class="text-editor-frame">
            <div id="noteBullets" class="text-bullet-layer" aria-hidden="true"></div>
            <textarea id="noteEditor" class="text-editor-textarea board-textarea large-textarea" placeholder="随手记：临时想法、灵感、草稿先放这里。" spellcheck="false"></textarea>
          </div>
        </div>

        <div class="split-block quick-block">
          <div class="panel-header">
            <h2 id="quick-title">链</h2>
            <div class="header-actions">
              <button id="addQuickBtn" class="ghost-button icon-action" type="button" aria-label="新增快捷链接" title="新增快捷链接">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </button>
              <button id="toggleHiddenBtn" class="ghost-button icon-action" type="button" aria-label="显示全部快捷链接" title="显示全部快捷链接">
                <svg id="iconEyeOff" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
                  <circle cx="12" cy="12" r="3" />
                  <line x1="2" y1="2" x2="22" y2="22" />
                </svg>
                <svg id="iconEye" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div id="quickButtons" class="quick-buttons" aria-label="快捷按钮列表"></div>
        </div>
      </section>

      <section class="panel todo-panel" aria-labelledby="todo-title">
        <div class="todo-sections">
          <section class="todo-section" data-period="morning">
            <div class="todo-heading">
              <h3 id="todo-morning-title">早</h3>
              <div class="todo-heading-actions">
                <span class="todo-count" data-count="morning">0</span>
                <button class="clear-completed-button icon-action" type="button" data-clear-completed="morning" aria-label="清已完成" title="清已完成"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="5" height="8" rx="1.5" transform="rotate(45 10.5 6)" /><path d="M6.5 10L2 21" /><path d="M10.5 14l2 7.5" /><path d="M14 10.5L18.5 20" /></svg></button>
              </div>
            </div>
            <ul class="todo-list" data-list="morning"></ul>
          </section>

          <section class="todo-section" data-period="noon">
            <div class="todo-heading">
              <h3 id="todo-noon-title">中</h3>
              <div class="todo-heading-actions">
                <span class="todo-count" data-count="noon">0</span>
                <button class="clear-completed-button icon-action" type="button" data-clear-completed="noon" aria-label="清已完成" title="清已完成"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="5" height="8" rx="1.5" transform="rotate(45 10.5 6)" /><path d="M6.5 10L2 21" /><path d="M10.5 14l2 7.5" /><path d="M14 10.5L18.5 20" /></svg></button>
              </div>
            </div>
            <ul class="todo-list" data-list="noon"></ul>
          </section>

          <section class="todo-section" data-period="evening">
            <div class="todo-heading">
              <h3 id="todo-evening-title">晚</h3>
              <div class="todo-heading-actions">
                <span class="todo-count" data-count="evening">0</span>
                <button class="clear-completed-button icon-action" type="button" data-clear-completed="evening" aria-label="清已完成" title="清已完成"><svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="5" height="8" rx="1.5" transform="rotate(45 10.5 6)" /><path d="M6.5 10L2 21" /><path d="M10.5 14l2 7.5" /><path d="M14 10.5L18.5 20" /></svg></button>
              </div>
            </div>
            <ul class="todo-list" data-list="evening"></ul>
          </section>
        </div>
      </section>

      <section class="panel text-panel" aria-labelledby="workspace-title">
        <div class="panel-header">
          <h2 id="workspace-title">工作空间</h2>
        </div>
        <div class="text-editor-frame">
          <div id="workspaceBullets" class="text-bullet-layer" aria-hidden="true"></div>
          <textarea id="workspaceEditor" class="text-editor-textarea board-textarea large-textarea" placeholder="工作空间：拆任务、写步骤、整理当前上下文。Tab 可缩进。" spellcheck="false"></textarea>
        </div>
      </section>

      <section class="panel text-panel" aria-labelledby="storage-title">
        <div class="panel-header">
          <h2 id="storage-title">工程文件</h2>
          <div class="header-actions">
            <button id="importJsonBtn" class="ghost-button icon-action" type="button" aria-label="导入 JSON" title="导入 JSON">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12" />
                <path d="M7 8l5-5 5 5" />
                <path d="M5 17v3h14v-3" />
              </svg>
            </button>
            <button id="exportJsonBtn" class="ghost-button icon-action" type="button" aria-label="导出 JSON" title="导出 JSON">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 21V9" />
                <path d="M7 16l5 5 5-5" />
                <path d="M5 7V4h14v3" />
              </svg>
            </button>
            <button id="themeToggle" class="ghost-button icon-action" type="button" aria-label="切换主题" title="切换主题">
              <svg id="iconSun" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </svg>
              <svg id="iconMoon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
          </div>
        </div>
        <input id="importJsonInput" type="file" accept="application/json,.json" hidden />
        <div class="text-editor-frame">
          <div id="storageBullets" class="text-bullet-layer" aria-hidden="true"></div>
          <textarea id="storageEditor" class="text-editor-textarea board-textarea large-textarea" placeholder="工程文件：放路径、命令、配置片段，随时复制查看。" spellcheck="false"></textarea>
        </div>
      </section>
    </main>

    <div id="focusCompanion" class="focus-companion" aria-hidden="true">
      <div id="saveBubble" class="save-bubble" role="status" aria-live="polite"></div>
      <img id="focusVideo" src="static/video/hermes.gif" alt="">
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="quickMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="edit">编辑</button>
      <button type="button" data-action="hide">隐藏</button>
      <button type="button" data-action="delete">删除</button>
    </div>

    <div id="todoMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="delete">删除</button>
    </div>

    <div id="imageMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="preview">预览</button>
      <button type="button" data-action="copy">复制</button>
      <button type="button" data-action="delete">删除</button>
    </div>

    <dialog id="quickDialog" class="quick-dialog">
      <form id="quickEditForm" method="dialog">
        <div class="dialog-header">
          <h2 id="quickDialogTitle">编辑快捷按钮</h2>
          <button class="icon-button" type="button" id="closeQuickDialog" aria-label="关闭">×</button>
        </div>
        <label>
          <span>标题</span>
          <input id="editQuickTitle" type="text" autocomplete="off" />
        </label>
        <label>
          <span>属性</span>
          <span class="checkbox-row">
            <input id="editQuickIsLink" type="checkbox" />
            <span>链接属性</span>
          </span>
        </label>
        <label>
          <span id="editQuickValueLabel">URL</span>
          <input id="editQuickValue" type="text" autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button type="button" id="deleteQuickInDialog" class="danger-button">删除</button>
          <button type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <div id="imagePreview" class="image-preview" aria-hidden="true">
      <div class="preview-sidebar">
        <div class="preview-sidebar-header">
          <button id="closePreview" class="preview-close" type="button" aria-label="关闭预览">×</button>
        </div>
        <div id="previewList" class="preview-list"></div>
      </div>
      <div class="preview-main">
        <div id="previewStage" class="preview-stage">
          <img id="previewImage" alt="图片预览" draggable="false" />
        </div>
        <div class="preview-help">← → 切换 · 滚轮缩放 · 拖动平移 · Enter 复制 · Delete 删除 · Esc 关闭</div>
      </div>
      <div id="previewMenu" class="context-menu" role="menu" aria-hidden="true">
        <button type="button" data-action="copy">复制</button>
        <button type="button" data-action="delete">删除</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
