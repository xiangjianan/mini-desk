<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>Life is short, use AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="board" aria-label="To Do List 看板">
      <section class="panel image-panel" aria-labelledby="image-title">
        <div class="panel-header">
          <h1 id="image-title">🎨 截图</h1>
          <span id="imageCount" class="count">0</span>
        </div>
        <div id="imageList" class="image-list" aria-label="图床图片列表"></div>
      </section>

      <section class="panel note-link-panel" aria-labelledby="note-title">
        <div class="split-block note-block">
          <div class="panel-header">
            <h2 id="note-title">📝 便签</h2>
          </div>
          <div class="text-editor-frame">
            <textarea id="noteEditor" class="text-editor-textarea board-textarea large-textarea" placeholder="" spellcheck="false"></textarea>
          </div>
        </div>

        <div class="split-block quick-block">
          <div class="panel-header">
            <h2 id="quick-title">🔗 快捷链接</h2>
            <div class="header-actions">
              <button id="addQuickBtn" class="ghost-button icon-action" type="button" aria-label="新增快捷链接" title="新增快捷链接">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </button>
              <button id="toggleHiddenBtn" class="ghost-button icon-action" type="button" aria-label="显示全部快捷链接" title="显示全部快捷链接">
                <svg id="iconEyeOff" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
                  <circle cx="12" cy="12" r="3" />
                  <line x1="2" y1="2" x2="22" y2="22" />
                </svg>
                <svg id="iconEye" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>
          <div id="quickButtons" class="quick-buttons" aria-label="快捷按钮列表"></div>
        </div>
      </section>

      <section class="panel todo-panel" aria-labelledby="todo-title">
        <div class="todo-sections">
          <section class="todo-section" data-period="morning">
            <div class="todo-heading">
              <h3 id="todo-morning-title">☀️ 早上</h3>
              <div class="todo-heading-actions">
                <span class="todo-count" data-count="morning">0</span>
                <button class="clear-completed-button icon-action" type="button" data-clear-completed="morning" aria-label="清已完成" title="清已完成"><svg viewBox="0 0 1024 1024" aria-hidden="true"><path d="M786.6 715.9c-5.1 0-10.3-1.3-15.1-4.1L295.4 434.7c-14.3-8.3-19.2-26.7-10.8-41 8.3-14.3 26.7-19.2 41-10.8L801.7 660c14.3 8.3 19.2 26.7 10.8 41-5.6 9.5-15.6 14.9-25.9 14.9z"></path><path d="M629.3 960c-14.7 0-29.3-4.2-42.1-11.6L186.1 714.7c-40-23.3-53.8-75.1-30.7-115.4l166.4-290.5c15-26.1 42.9-42.4 72.9-42.4 14.7 0 29.3 3.9 42.1 11.4l113.2 66 129-225.2c19.1-33.4 54.8-54.1 93.1-54.1 18.8 0 37.4 5 53.7 14.5 51.1 29.8 68.8 95.9 39.3 147.4L735.9 452l102 59.4c40 23.3 53.8 75 30.7 115.3L702.2 917.4c-14.9 26.1-42.9 42.6-72.9 42.6zM394.7 326.4c-8.6 0-16.5 4.7-20.8 12.2L207.5 629.1c-6.7 11.8-2.8 26.9 8.9 33.6l401.1 233.5c3.7 2.1 7.7 3.2 11.9 3.2 8.6 0 16.5-4.7 20.8-12.2l166.4-290.5c6.7-11.8 2.8-26.9-8.8-33.6L680 488.8c-14.2-8.3-19.1-26.5-10.9-40.8L813 196.6c13.2-23 5.4-52.5-17.4-65.7-7.2-4.2-15.3-6.4-23.5-6.4-16.9 0-32.6 9.2-41 23.9l-144 251.4c-4 6.9-10.5 12-18.3 14.1-7.7 2.1-15.9 1-22.9-3.1l-139.4-81.1c-3.6-2.2-7.6-3.3-11.8-3.3z"></path></svg></button>
              </div>
            </div>
            <ul class="todo-list" data-list="morning"></ul>
          </section>

          <section class="todo-section" data-period="noon">
            <div class="todo-heading">
              <h3 id="todo-noon-title">🌤️ 中午</h3>
              <div class="todo-heading-actions">
                <span class="todo-count" data-count="noon">0</span>
                <button class="clear-completed-button icon-action" type="button" data-clear-completed="noon" aria-label="清已完成" title="清已完成"><svg viewBox="0 0 1024 1024" aria-hidden="true"><path d="M786.6 715.9c-5.1 0-10.3-1.3-15.1-4.1L295.4 434.7c-14.3-8.3-19.2-26.7-10.8-41 8.3-14.3 26.7-19.2 41-10.8L801.7 660c14.3 8.3 19.2 26.7 10.8 41-5.6 9.5-15.6 14.9-25.9 14.9z"></path><path d="M629.3 960c-14.7 0-29.3-4.2-42.1-11.6L186.1 714.7c-40-23.3-53.8-75.1-30.7-115.4l166.4-290.5c15-26.1 42.9-42.4 72.9-42.4 14.7 0 29.3 3.9 42.1 11.4l113.2 66 129-225.2c19.1-33.4 54.8-54.1 93.1-54.1 18.8 0 37.4 5 53.7 14.5 51.1 29.8 68.8 95.9 39.3 147.4L735.9 452l102 59.4c40 23.3 53.8 75 30.7 115.3L702.2 917.4c-14.9 26.1-42.9 42.6-72.9 42.6zM394.7 326.4c-8.6 0-16.5 4.7-20.8 12.2L207.5 629.1c-6.7 11.8-2.8 26.9 8.9 33.6l401.1 233.5c3.7 2.1 7.7 3.2 11.9 3.2 8.6 0 16.5-4.7 20.8-12.2l166.4-290.5c6.7-11.8 2.8-26.9-8.8-33.6L680 488.8c-14.2-8.3-19.1-26.5-10.9-40.8L813 196.6c13.2-23 5.4-52.5-17.4-65.7-7.2-4.2-15.3-6.4-23.5-6.4-16.9 0-32.6 9.2-41 23.9l-144 251.4c-4 6.9-10.5 12-18.3 14.1-7.7 2.1-15.9 1-22.9-3.1l-139.4-81.1c-3.6-2.2-7.6-3.3-11.8-3.3z"></path></svg></button>
              </div>
            </div>
            <ul class="todo-list" data-list="noon"></ul>
          </section>

          <section class="todo-section" data-period="evening">
            <div class="todo-heading">
              <h3 id="todo-evening-title">🌙 晚上</h3>
              <div class="todo-heading-actions">
                <span class="todo-count" data-count="evening">0</span>
                <button class="clear-completed-button icon-action" type="button" data-clear-completed="evening" aria-label="清已完成" title="清已完成"><svg viewBox="0 0 1024 1024" aria-hidden="true"><path d="M786.6 715.9c-5.1 0-10.3-1.3-15.1-4.1L295.4 434.7c-14.3-8.3-19.2-26.7-10.8-41 8.3-14.3 26.7-19.2 41-10.8L801.7 660c14.3 8.3 19.2 26.7 10.8 41-5.6 9.5-15.6 14.9-25.9 14.9z"></path><path d="M629.3 960c-14.7 0-29.3-4.2-42.1-11.6L186.1 714.7c-40-23.3-53.8-75.1-30.7-115.4l166.4-290.5c15-26.1 42.9-42.4 72.9-42.4 14.7 0 29.3 3.9 42.1 11.4l113.2 66 129-225.2c19.1-33.4 54.8-54.1 93.1-54.1 18.8 0 37.4 5 53.7 14.5 51.1 29.8 68.8 95.9 39.3 147.4L735.9 452l102 59.4c40 23.3 53.8 75 30.7 115.3L702.2 917.4c-14.9 26.1-42.9 42.6-72.9 42.6zM394.7 326.4c-8.6 0-16.5 4.7-20.8 12.2L207.5 629.1c-6.7 11.8-2.8 26.9 8.9 33.6l401.1 233.5c3.7 2.1 7.7 3.2 11.9 3.2 8.6 0 16.5-4.7 20.8-12.2l166.4-290.5c6.7-11.8 2.8-26.9-8.8-33.6L680 488.8c-14.2-8.3-19.1-26.5-10.9-40.8L813 196.6c13.2-23 5.4-52.5-17.4-65.7-7.2-4.2-15.3-6.4-23.5-6.4-16.9 0-32.6 9.2-41 23.9l-144 251.4c-4 6.9-10.5 12-18.3 14.1-7.7 2.1-15.9 1-22.9-3.1l-139.4-81.1c-3.6-2.2-7.6-3.3-11.8-3.3z"></path></svg></button>
              </div>
            </div>
            <ul class="todo-list" data-list="evening"></ul>
          </section>
        </div>
      </section>

      <section class="panel text-panel" aria-labelledby="workspace-title">
        <div class="panel-header">
          <h2 id="workspace-title">📁 工作空间</h2>
        </div>
        <div class="text-editor-frame">
          <textarea id="workspaceEditor" class="text-editor-textarea board-textarea large-textarea" placeholder="工作空间：拆任务、写步骤、整理当前上下文。Tab 可缩进。" spellcheck="false"></textarea>
        </div>
      </section>

      <section class="panel text-panel" aria-labelledby="storage-title">
        <div class="panel-header">
          <h2 id="storage-title">🛠 双击可改名</h2>
          <div class="header-actions">
            <button id="themeToggle" class="ghost-button icon-action" type="button" aria-label="切换主题" title="切换主题">
              <svg id="iconSun" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </svg>
              <svg id="iconMoon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
          </div>
        </div>
        </div>
        <div class="text-editor-frame">
          <textarea id="storageEditor" class="text-editor-textarea board-textarea large-textarea" placeholder="尽情发挥吧" spellcheck="false"></textarea>
        </div>
      </section>
    </main>

    <div id="focusCompanion" class="focus-companion" aria-hidden="true">
      <div id="bubbleBox" class="bubble-box" role="status" aria-live="polite">
        <span id="bubbleText"></span>
        <div id="bubbleActions" class="bubble-actions" hidden>
          <button type="button" id="bubbleYes">是</button>
          <button type="button" id="bubbleNo">否</button>
        </div>
      </div>
      <img id="focusVideo" src="static/video/hermes.gif" alt="">
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="quickMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="edit">编辑</button>
      <button type="button" data-action="hide">隐藏</button>
      <button type="button" data-action="delete">删除</button>
    </div>

    <div id="todoMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="delete">删除</button>
    </div>

    <div id="imageMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="preview">预览</button>
      <button type="button" data-action="copy">复制</button>
      <button type="button" data-action="delete">删除</button>
    </div>
    <div id="imageListMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="paste">粘贴图片</button>
    </div>

    <dialog id="quickDialog" class="quick-dialog">
      <form id="quickEditForm" method="dialog">
        <div class="dialog-header">
          <h2 id="quickDialogTitle">编辑快捷按钮</h2>
          <button class="icon-button" type="button" id="closeQuickDialog" aria-label="关闭">×</button>
        </div>
        <label>
          <span>标题</span>
          <input id="editQuickTitle" type="text" autocomplete="off" />
        </label>
        <label>
          <span>属性</span>
          <span class="checkbox-row">
            <input id="editQuickIsLink" type="checkbox" />
            <span>链接属性</span>
          </span>
        </label>
        <label>
          <span id="editQuickValueLabel">URL</span>
          <input id="editQuickValue" type="text" autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button type="button" id="deleteQuickInDialog" class="danger-button">删除</button>
          <button type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <div id="imagePreview" class="image-preview" aria-hidden="true">
      <div class="preview-sidebar">
        <div class="preview-sidebar-header">
          <button id="closePreview" class="preview-close" type="button" aria-label="关闭预览">×</button>
        </div>
        <div id="previewList" class="preview-list"></div>
      </div>
      <div class="preview-main">
        <div id="previewStage" class="preview-stage">
          <img id="previewImage" alt="图片预览" draggable="false" />
        </div>
        <div class="preview-help">← → 切换 · 滚轮缩放 · 拖动平移 · Enter 复制 · Delete 删除 · Esc 关闭</div>
      </div>
      <div id="previewMenu" class="context-menu" role="menu" aria-hidden="true">
        <button type="button" data-action="close">取消预览</button>
        <button type="button" data-action="copy">复制</button>
        <button type="button" data-action="delete">删除</button>
      </div>
    </div>

    <div id="settingsBtn" class="settings-btn" title="设置">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
    <div id="settingsMenu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="export">数据导出</button>
      <button type="button" data-action="import">数据导入</button>
      <button type="button" data-action="github"><svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" style="vertical-align:-2px;margin-right:4px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" fill="currentColor"/></svg>关于</button>
    </div>
    <input id="importJsonInput" type="file" accept="application/json,.json" hidden />

    <script src="app.js"></script>
  </body>
</html>
